services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: binn
      POSTGRES_PASSWORD: binn
      POSTGRES_DB: binn_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binn -d binn_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BINN_DATABASE_URL: postgresql+asyncpg://binn:binn@db:5432/binn_agent
      BINN_OLLAMA_BASE_URL: http://host.docker.internal:11434
      BINN_OLLAMA_CHAT_MODEL: ${BINN_OLLAMA_CHAT_MODEL:-gemma4:e2b}
      BINN_OLLAMA_UTILITY_MODEL: ${BINN_OLLAMA_UTILITY_MODEL:-gemma4:e2b}
      BINN_OLLAMA_EMBEDDING_MODEL: ${BINN_OLLAMA_EMBEDDING_MODEL:-nomic-embed-text:latest}
      BINN_REDIS_URL: redis://redis:6379/0
      BINN_KNOWLEDGE_UPLOAD_DIR: /app/var/knowledge/uploads
      BINN_LANGFUSE_ENABLED: ${BINN_LANGFUSE_ENABLED:-false}
      BINN_LANGFUSE_PUBLIC_KEY: ${BINN_LANGFUSE_PUBLIC_KEY:-}
      BINN_LANGFUSE_SECRET_KEY: ${BINN_LANGFUSE_SECRET_KEY:-}
      BINN_LANGFUSE_BASE_URL: ${BINN_LANGFUSE_DOCKER_BASE_URL:-http://host.docker.internal:3100}
      BINN_LANGFUSE_ENVIRONMENT: ${BINN_LANGFUSE_ENVIRONMENT:-development}
    volumes:
      - knowledge_data:/app/var/knowledge
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  knowledge_data:
